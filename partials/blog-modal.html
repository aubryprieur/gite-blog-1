<!-- ── BLOG MODAL ───────────────────────────────────────── -->
  <div class="blog-modal-overlay" id="blogModal" role="dialog" aria-modal="true">
    <div class="blog-modal" id="blogModalBox">
      <button class="modal-close" id="modalClose" aria-label="Fermer">✕</button>
      <div class="modal-hero-img">
        <img id="modalImg" src="" alt="" />
      </div>
      <div class="modal-content">
        <div class="modal-meta">
          <span class="modal-cat" id="modalCat"></span>
          <span class="modal-date">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span id="modalDate"></span>
          </span>
        </div>
        <h2 id="modalTitle"></h2>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
  </div>
